name: attendance_ai
description: AttendanceAI - Smart Student Attendance Tracker
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_storage: ^12.1.3

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Charts
  fl_chart: ^0.68.0

  # Fonts
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.3.1

  # Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  uuid: ^4.4.2
  equatable: ^2.0.5

  # Icons
  cupertino_icons: ^1.0.8

  # Timetable OCR feature
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # ── ML Kit OCR (on-device, no server needed) ─────────────────────────────
  google_mlkit_text_recognition: ^0.13.1

  # ── Groq API (structured timetable parsing via LLaMA) ──────────────────
  http: ^1.2.2

  # ── PDF rendering (PDF pages → images for OCR) ───────────────────────
  pdfx: ^2.6.0

  # ── Temp directory for PDF rendering ─────────────────────────────────
  path_provider: ^2.1.4

  # Env config (for Gemini API key)
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - .env
